<div
  class="confirm-dialog"
  [attr.role]="isDestructive() ? 'alertdialog' : 'dialog'"
  aria-modal="false"
  aria-labelledby="confirm-dialog-title"
  aria-describedby="confirm-dialog-message"
>
  <p class="confirm-dialog__title" id="confirm-dialog-title">Confirmation required</p>
  <p class="confirm-dialog__message" id="confirm-dialog-message">{{ message() }}</p>

  @if (isDestructive()) {
    <p class="confirm-dialog__warning">This cannot be undone.</p>
  }

  <div class="confirm-dialog__actions">
    <button
      type="button"
      class="confirm-dialog__button confirm-dialog__button--confirm"
      [class.confirm-dialog__button--destructive]="isDestructive()"
      (click)="confirmed.emit()"
    >
      Confirm
    </button>
    <button
      type="button"
      class="confirm-dialog__button confirm-dialog__button--cancel"
      (click)="cancelled.emit()"
    >
      Cancel
    </button>
  </div>
</div>
