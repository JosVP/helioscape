<div class="mercury">

  <div class="mercury__canvas-area">
    <app-mercury-grid
      [selectedBuildingId]="selectedBuildingId()"
      (tileClicked)="onTileClicked($event)"
      [attr.inert]="gameState.mercurySelectedZone() === null ? '' : null"
    />
    @if (activeBuildingInfo(); as info) {
      <app-mercury-building-info
        [buildingId]="info.buildingId"
        [placedId]="info.placedId"
        [slotId]="info.slotId"
        (closed)="activeBuildingInfo.set(null)"
      />
    }
  </div>

  <aside class="mercury__sidebar" aria-label="Mercury controls">
    <button class="mercury__back-btn" (click)="backToOrrery.emit()" aria-label="Back to orrery">
      ← Orrery
    </button>
    <app-mercury-sidebar (buildingSelected)="selectedBuildingId.set($event)" />
  </aside>

  <app-mercury-queue-bar />
  @if (gameState.mercurySelectedZone() === null) {
    <app-mercury-zone-select />
  }

</div>
