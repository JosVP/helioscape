<div class="research-hub__backdrop" (click)="close()" aria-hidden="true"></div>

<div class="research-hub__panel" role="dialog" aria-modal="true" aria-labelledby="research-hub-title">
  <header class="research-hub__header">
    <div class="research-hub__header-text">
      <h2 class="research-hub__title" id="research-hub-title">Research Hub</h2>
      <p class="research-hub__subtitle">
        Every idea that carries us further begins here.
      </p>
    </div>

    <app-research-slot-strip />

    <button
      #closeBtn
      class="research-hub__close"
      type="button"
      aria-label="Close Research Hub"
      (click)="close()"
    >✕</button>
  </header>

  <div class="research-hub__body">
    <app-research-hex-map
      [nodes]="mapNodes()"
      [lines]="mapLines()"
      [layout]="layout"
      [selectedNodeId]="selectedEntry()?.node?.id ?? null"
      [recentlyCompletedIds]="recentlyCompletedIds()"
      [newlyAvailableIds]="newlyAvailableIds()"
      (nodeSelected)="onNodeSelect($event)"
    />

    <aside class="research-hub__right-panel">
      <app-research-node-details
        [viewModel]="selectedDetailsVm()"
        (startRequested)="onStartSelectedNode($event)"
        (pauseRequested)="onPauseSelectedNode($event)"
        (resumeRequested)="onResumeSelectedNode($event)"
        (prerequisiteFocused)="focusNode($event)"
      />

      <app-research-arc-progress-panel [arcs]="arcPanelViews()" />
    </aside>
  </div>

  @if (showForkModal() && pendingFork() !== null) {
    <app-fork-choice-modal [fork]="pendingFork()!" />
  }
</div>
