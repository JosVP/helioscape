<span class="tech-node-icon" [class.tech-node-icon--large]="size() === 'large'">
  @if (imagePath(); as path) {
    <img [src]="path" alt="" width="40" height="40" />
  } @else if (isHint()) {
    <svg viewBox="0 0 40 40" width="40" height="40" aria-hidden="true">
      <circle cx="20" cy="20" r="18" fill="var(--color-text-disabled)" opacity="0.5" />
      <text x="20" y="26" text-anchor="middle" font-size="18" fill="var(--color-bg-base)">?</text>
    </svg>
  } @else {
    <svg viewBox="0 0 40 40" width="40" height="40" aria-hidden="true">
      <circle
        cx="20"
        cy="20"
        r="18"
        [attr.fill]="visibility() === 'completed' ? 'var(--color-success)' : 'var(--color-' + planetId() + ', var(--color-accent))'"
        opacity="0.25"
      />
      <circle
        cx="20"
        cy="20"
        r="10"
        [attr.fill]="visibility() === 'completed' ? 'var(--color-success)' : 'var(--color-' + planetId() + ', var(--color-accent))'"
        opacity="0.6"
      />
    </svg>
  }
</span>
