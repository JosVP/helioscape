<div class="research">
  <!-- Running group -->
  @if (runningTracks().length) {
    <section class="research__group research__group--running">
      <h3 class="research__group-heading">Running</h3>
      @for (t of runningTracks(); track t.def.id) {
        <app-research-track-item
          [vm]="t"
          (pause)="pause($event)"
        />
      }
    </section>
  }

  <!-- Paused group -->
  @if (pausedTracks().length) {
    <section class="research__group research__group--paused">
      <h3 class="research__group-heading">Paused</h3>
      @for (t of pausedTracks(); track t.def.id) {
        <app-research-track-item
          [vm]="t"
          (resume)="resume($event)"
        />
      }
    </section>
  }

  <!-- Available group -->
  @if (availableTracks().length) {
    <section class="research__group research__group--available">
      <h3 class="research__group-heading">Available</h3>
      @for (t of availableTracks(); track t.def.id) {
        <app-research-track-item
          [vm]="t"
          (start)="start($event)"
        />
      }
    </section>
  }

</div>
