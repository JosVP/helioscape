<div class="hud__left">
  <app-year-label />
</div>

<div class="hud__centre">
  <app-kardashev-bar />
</div>

<div class="hud__right">
  <button
    class="hud__research-btn"
    title="Research Hub"
    aria-label="Open Research Hub"
    (click)="openResearchHub()"

  <app-culture-event-bell />
  <app-time-controls />

    Autosaved ✓
  </span>
</div>
