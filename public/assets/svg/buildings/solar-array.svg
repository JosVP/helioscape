  <rect x="26" y="20" width="18" height="12" rx="1" fill="#1a3a6a" stroke="#4090e0" stroke-width="1.5" stroke-dasharray="3 2"/>
  <line x1="35" y1="20" x2="35" y2="32" stroke="#4090e0" stroke-width="0.5"/>
