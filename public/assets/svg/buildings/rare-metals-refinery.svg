<!-- PLACEHOLDER: rare-metals-refinery.svg — swap with final art -->
<svg xmlns="http://www.w3.org/2000/svg" width="48" height="64" viewBox="0 0 48 64">
  <!-- Main building body -->
  <rect x="8" y="28" width="32" height="28" rx="2" fill="#5a4830" stroke="#c08840" stroke-width="1.5" stroke-dasharray="3 2"/>
  <!-- Smelting chimney left -->
  <rect x="10" y="16" width="8" height="14" rx="1" fill="#4a3820" stroke="#c08840" stroke-width="1"/>
  <!-- Smelting chimney right -->
  <rect x="30" y="20" width="8" height="10" rx="1" fill="#4a3820" stroke="#c08840" stroke-width="1"/>
  <!-- Smoke puffs -->
  <circle cx="14" cy="13" r="3" fill="#606060" opacity="0.6"/>
  <circle cx="12" cy="9" r="2" fill="#606060" opacity="0.4"/>
  <!-- Ore conveyor belt -->
  <rect x="14" y="44" width="20" height="6" rx="1" fill="#806040"/>
  <circle cx="16" cy="47" r="2" fill="#a08060"/>
  <circle cx="32" cy="47" r="2" fill="#a08060"/>
  <!-- Metal gleam dots -->
  <circle cx="22" cy="36" r="2" fill="#d4a020" opacity="0.9"/>
  <circle cx="28" cy="40" r="2" fill="#c890a0" opacity="0.9"/>
  <!-- Label -->
  <text x="24" y="10" text-anchor="middle" font-family="monospace" font-size="4" fill="#c08840">REFINERY</text>
</svg>
